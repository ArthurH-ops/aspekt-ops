        <header>
          <h1>Aspekt Operations — Strategic Advisory for Deep-Tech & Hardware Startups</h1>
          <p><strong>Your tech works. Now make it a product.</strong></p>
          <p>We help deep-tech founders turn working prototypes into buildable, fundable products. Based in Vienna, Austria. Building since 2016.</p>
        </header>

        <main>
          <section>
            <h2>What We Do</h2>
            <p>Aspekt Operations is a strategic advisory firm for hardware and deep-tech startups. We deliver technical project plans that take founders from prototype to product.</p>

            <h3>Technical Assessment</h3>
            <p>You have working tech but no clear path to a product. We assess what you've built, identify the gaps, and map what it takes to get from here to something real. Deliverables: Feasibility validation, Architecture review, Risk identification, Build vs buy analysis.</p>

            <h3>Technical Project Plan</h3>
            <p>Founders tell us the hardest part isn't the science — it's knowing what to build next. We deliver a concrete plan: architecture, milestones, cost structure, and the roadmap to get there. Deliverables: System architecture, Development roadmap, Milestone planning, Cost estimation.</p>

            <h3>Fundraise Support</h3>
            <p>When it comes to technical due diligence, we've seen founders struggle with questions they weren't prepared for. We help you build the technical narrative and materials before you need them. Deliverables: Tech narrative for pitch, Technical roadmap, DD preparation, Data room materials.</p>
          </section>

          <section>
            <h2>Deep-Tech Verticals</h2>
            <p>We work with startups across: Medical Devices, Biotech, Healthcare IoT, Consumer Hardware, Industrial Tech, Robotics, Space Tech, Energy, Lab Automation, and AI Hardware.</p>
          </section>

          <section>
            <h2>Selected Work (via Aspekt Development)</h2>
            <ul>
              <li><strong>Brightmind</strong> — Medical Device: Non-invasive brain stimulation for migraine prevention. Prototype to CE certification.</li>
              <li><strong>Cellectric</strong> — Biotech: Laboratory electroporation system. Full product development.</li>
              <li><strong>Lifetaq</strong> — Biotech: 3D human cell models for pharma drug testing.</li>
              <li><strong>DigniSens</strong> — Healthcare IoT: Digital sensor systems for nursing care.</li>
              <li><strong>EOOS</strong> — Consumer: Award-winning industrial design. Precision manufacturing.</li>
            </ul>
            <p>Trusted by: Philips, Palfinger, Cellectric, Brightmind, Playbrush, DigniSens</p>
          </section>

          <section>
            <h2>Our Process</h2>
            <ol>
              <li><strong>Discovery</strong> (30 min call) — We learn about your technology, your stage, and where you're stuck.</li>
              <li><strong>Assessment</strong> (1-2 weeks) — We dig into what you've built, identify risks, and map the gap between prototype and product.</li>
              <li><strong>Project Plan</strong> (2-4 weeks) — We deliver your technical project plan — architecture, milestones, and a roadmap you can build on.</li>
              <li><strong>Support</strong> (As needed) — We stay available for follow-up: technical questions, fundraise prep, or due diligence support.</li>
            </ol>
          </section>

          <section>
            <h2>Why Aspekt Operations</h2>
            <p>We are technologists, and we believe most of the world's problems can be solved through realized breakthroughs. We're the team behind Aspekt Development — a product studio that has been turning deep-tech research into shippable hardware since 2016.</p>
            <p>Most deep-tech startups don't fail because the science is wrong. They fail because no one turned it into a buildable, fundable plan.</p>
          </section>
